name: Run Daily Strategies

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'

permissions:
  contents: write

jobs:
  run-strategies:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Beijing
      MPLBACKEND: Agg
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      RECIPIENTS_str: ${{ secrets.RECIPIENTS_str }}
      GOOGLE_EMAIL_APP_PASSWORD: ${{ secrets.GOOGLE_EMAIL_APP_PASSWORD }}
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Harry Browne strategy
        run: python 'Harry Browne Final_new.py'

      - name: Run Convertible Bond strategy
        run: python 'Con Bond Harry.py'

      - name: Commit and push generated files
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
            exit 0
          fi
          git commit -m "chore: update daily strategy outputs"
          git push
